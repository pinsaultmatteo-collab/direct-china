<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console produits — Direct China</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,300..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1220;--ink-2:#0F1A2E;--ink-3:#15233C;--white:#FAFBFD;
  --steel:#8C99AD;--steel-d:#5B6B82;--line:rgba(140,153,173,.22);
  --yellow:#F5B301;--yellow-d:#D99E00;--blue:#3D7DC2;--red:#C0392B;--green:#3FB27F;
  --font-d:'Archivo',sans-serif;--font-m:'IBM Plex Mono',monospace;--ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-d);background:var(--ink);color:var(--white);line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14.5px;color:var(--white);background:var(--ink-3);border:1px solid var(--line);border-radius:9px;padding:11px 13px;width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--yellow)}
textarea{resize:vertical;min-height:90px;line-height:1.55}
label{display:block;font-family:var(--font-m);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--steel-d);margin-bottom:7px}
.field{margin-bottom:18px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14px;padding:11px 20px;border-radius:9px;transition:transform .25s var(--ease),background .25s,box-shadow .25s;white-space:nowrap}
.btn-primary{background:var(--yellow);color:var(--ink);box-shadow:0 10px 28px -12px rgba(245,179,1,.5)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-ghost{border:1px solid var(--line);color:var(--white)}
.btn-ghost:hover{background:rgba(255,255,255,.05)}
.btn-danger{border:1px solid rgba(192,57,43,.5);color:#E8867B}
.btn-danger:hover{background:rgba(192,57,43,.12)}
.btn-sm{padding:7px 13px;font-size:12.5px;font-weight:600}
.logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:15px;letter-spacing:.02em;font-variation-settings:'wdth' 115}
.logo span em{font-style:normal;color:var(--yellow)}
.logo svg{width:30px;height:30px}

/* topbar */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 26px;background:rgba(11,18,32,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.topbar .tag{font-family:var(--font-m);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--steel-d);border:1px solid var(--line);padding:5px 9px;border-radius:6px}
.topbar-right{display:flex;align-items:center;gap:14px}
.topbar-right .who{font-family:var(--font-m);font-size:11px;color:var(--steel)}
.wrap{max-width:1080px;margin:0 auto;padding:30px 26px 80px}

/* screens */
.screen{display:none}.screen.active{display:block}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.toolbar h1{font-size:24px;font-weight:800;font-variation-settings:'wdth' 110;margin-right:auto}
.toolbar select{width:auto;min-width:160px}
.count{font-family:var(--font-m);font-size:11px;color:var(--steel-d);letter-spacing:.1em}

/* table */
.tbl{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--ink-2)}
.trow{display:grid;grid-template-columns:64px 1fr 180px 120px 110px auto;gap:16px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);transition:background .2s}
.trow:last-child{border-bottom:none}
.trow:hover{background:rgba(255,255,255,.025)}
.trow.head{background:rgba(255,255,255,.03);font-family:var(--font-m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--steel-d)}
.thumb{width:64px;height:48px;border-radius:7px;border:1px solid var(--line);background:linear-gradient(160deg,var(--ink-3),var(--ink));object-fit:cover;display:flex;align-items:center;justify-content:center;color:var(--steel-d);overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb svg{width:22px;height:22px;opacity:.6}
.t-title{font-weight:700;font-size:15px;font-variation-settings:'wdth' 104}
.t-sum{font-size:12.5px;color:var(--steel);margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.t-cat{font-size:13px;color:var(--steel)}
.t-price{font-family:var(--font-m);font-size:12px;color:var(--yellow)}
.badge{font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 9px;border-radius:6px;display:inline-block}
.badge.published{background:rgba(63,178,127,.14);color:var(--green);border:1px solid rgba(63,178,127,.35)}
.badge.draft{background:rgba(140,153,173,.12);color:var(--steel);border:1px solid var(--line)}
.t-actions{display:flex;gap:7px;justify-content:flex-end}
@media(max-width:880px){
  .trow{grid-template-columns:52px 1fr auto;gap:12px}
  .trow .t-cat,.trow .t-price,.trow.head{display:none}
  .t-actions{grid-column:1 / -1;justify-content:flex-start;margin-top:4px}
}

/* empty / notice */
.empty{border:1px dashed var(--line);border-radius:14px;padding:50px 30px;text-align:center;color:var(--steel)}
.empty h3{color:var(--white);font-size:18px;margin-bottom:8px}
.empty p{font-size:14px;margin-bottom:20px}
.notice{border:1px solid rgba(245,179,1,.4);background:rgba(245,179,1,.06);border-radius:12px;padding:18px 20px;font-size:13.5px;color:#E8DCC0;margin-bottom:22px}
.notice code{font-family:var(--font-m);font-size:12px;color:var(--yellow);background:rgba(0,0,0,.25);padding:2px 6px;border-radius:4px}

/* editor */
.ed-top{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.back{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-m);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--steel);transition:color .2s}
.back:hover{color:var(--yellow)}.back svg{transform:rotate(180deg)}
.ed-top h2{font-size:20px;font-weight:800;margin-right:auto;font-variation-settings:'wdth' 108}
.ed-grid{display:grid;grid-template-columns:1fr 340px;gap:26px;align-items:start}
.card{border:1px solid var(--line);border-radius:14px;background:var(--ink-2);padding:24px}
.card h3{font-family:var(--font-m);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel-d);margin-bottom:18px}
.side{position:sticky;top:88px;display:flex;flex-direction:column;gap:20px}
@media(max-width:860px){.ed-grid{grid-template-columns:1fr}.side{position:static}}

/* images */
.dropzone{border:1.5px dashed var(--line);border-radius:11px;padding:22px;text-align:center;color:var(--steel);font-size:13px;cursor:pointer;transition:border-color .2s,background .2s}
.dropzone:hover,.dropzone.drag{border-color:var(--yellow);background:rgba(245,179,1,.05);color:var(--white)}
.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.thumb-item{position:relative;border:1px solid var(--line);border-radius:9px;overflow:hidden;aspect-ratio:4/3;background:var(--ink-3)}
.thumb-item img{width:100%;height:100%;object-fit:cover}
.thumb-item .ti-actions{position:absolute;inset:auto 0 0 0;display:flex;justify-content:space-between;padding:5px;background:linear-gradient(transparent,rgba(11,18,32,.85))}
.ti-actions button{width:26px;height:26px;border-radius:6px;background:rgba(11,18,32,.7);border:1px solid var(--line);font-size:13px;line-height:1;color:var(--white);display:flex;align-items:center;justify-content:center;transition:background .2s}
.ti-actions button:hover{background:var(--yellow);color:var(--ink)}
.thumb-item .first-tag{position:absolute;top:6px;left:6px;font-family:var(--font-m);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;background:var(--yellow);color:var(--ink);padding:3px 6px;border-radius:5px;font-weight:600}

/* login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:380px;border:1px solid var(--line);border-radius:18px;background:var(--ink-2);padding:38px 34px}
.login-card .logo{justify-content:center;margin-bottom:8px}
.login-card .sub{text-align:center;font-size:13px;color:var(--steel);margin-bottom:26px}
.err{color:#E8867B;font-size:13px;margin-top:6px;min-height:18px}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink-3);border:1px solid var(--line);border-radius:11px;padding:13px 20px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.3s var(--ease);z-index:100;box-shadow:0 18px 40px -16px rgba(0,0,0,.6)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(63,178,127,.5)}#toast.bad{border-color:rgba(192,57,43,.5)}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:currentColor;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <div class="logo"><svg viewBox="0 0 40 40" fill="none"><rect x="3" y="12" width="34" height="20" rx="2.5" stroke="#F5B301" stroke-width="2.4"/><line x1="10" y1="12" x2="10" y2="32" stroke="#F5B301" stroke-width="2"/><line x1="17" y1="12" x2="17" y2="32" stroke="#F5B301" stroke-width="2"/><line x1="24" y1="12" x2="24" y2="32" stroke="#F5B301" stroke-width="2"/><line x1="31" y1="12" x2="31" y2="32" stroke="#F5B301" stroke-width="2"/><path d="M6 8 L20 2 L34 8" stroke="#FAFBFD" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>DIRECT<em>CHINA</em></span></div>
    <p class="sub">Console produits</p>
    <div id="cfgNotice"></div>
    <div class="field"><label>E-mail</label><input type="email" id="loginEmail" autocomplete="username"></div>
    <div class="field"><label>Mot de passe</label><input type="password" id="loginPass" autocomplete="current-password"></div>
    <button class="btn btn-primary" id="loginBtn" style="width:100%">Se connecter</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="logo"><svg viewBox="0 0 40 40" fill="none"><rect x="3" y="12" width="34" height="20" rx="2.5" stroke="#F5B301" stroke-width="2.4"/><line x1="10" y1="12" x2="10" y2="32" stroke="#F5B301" stroke-width="2"/><line x1="17" y1="12" x2="17" y2="32" stroke="#F5B301" stroke-width="2"/><line x1="24" y1="12" x2="24" y2="32" stroke="#F5B301" stroke-width="2"/><line x1="31" y1="12" x2="31" y2="32" stroke="#F5B301" stroke-width="2"/><path d="M6 8 L20 2 L34 8" stroke="#FAFBFD" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>DIRECT<em>CHINA</em></span><span class="tag">Console produits</span></div>
    <div class="topbar-right"><span class="who" id="who"></span><a class="btn btn-ghost btn-sm" href="catalogue.html" target="_blank">Voir le site</a><button class="btn btn-ghost btn-sm" id="logoutBtn">Déconnexion</button></div>
  </div>

  <div class="wrap">
    <!-- LISTE -->
    <div class="screen active" id="listScreen">
      <div class="toolbar">
        <h1>Produits</h1>
        <span class="count" id="count"></span>
        <select id="filterCat"><option value="">Toutes catégories</option></select>
        <select id="filterStatus"><option value="">Tous statuts</option><option value="published">Publiés</option><option value="draft">Brouillons</option></select>
        <button class="btn btn-primary" id="newBtn">+ Nouveau produit</button>
      </div>
      <div id="listBody"></div>
    </div>

    <!-- ÉDITEUR -->
    <div class="screen" id="editScreen">
      <div class="ed-top">
        <a class="back" id="backBtn"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 8h11M9 3.5L13.5 8 9 12.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Liste</a>
        <h2 id="edTitle">Nouveau produit</h2>
        <button class="btn btn-danger btn-sm" id="deleteBtn" style="display:none">Supprimer</button>
      </div>
      <div class="ed-grid">
        <div class="card">
          <h3>Informations</h3>
          <div class="field"><label>Titre du produit</label><input id="f_title" placeholder="Ex : Mini-nacelle araignée 12 m"></div>
          <div class="field"><label>Catégorie</label><select id="f_category"></select></div>
          <div class="field"><label>Accroche (ligne affichée sur la carte)</label><textarea id="f_summary" placeholder="Une phrase courte et concrète : usage, atout clé."></textarea></div>
          <div class="field"><label>Description complète (page produit, à venir)</label><textarea id="f_description" style="min-height:160px" placeholder="Description détaillée, spécifications, arguments. À réécrire dans la voix Direct China."></textarea></div>
          <div class="field"><label>Lien fournisseur Alibaba (interne, jamais affiché)</label><input id="f_supplier" placeholder="https://www.alibaba.com/product-detail/..."></div>
        </div>
        <div class="side">
          <div class="card">
            <h3>Publication</h3>
            <div class="field"><label>Statut</label><select id="f_status"><option value="draft">Brouillon</option><option value="published">Publié</option></select></div>
            <div class="row2">
              <div class="field" style="margin:0"><label>Prix</label><select id="f_priceMode"><option value="quote">Sur devis</option><option value="fixed">Montant fixe</option></select></div>
              <div class="field" style="margin:0"><label>Libellé prix</label><input id="f_priceLabel" placeholder="Sur devis"></div>
            </div>
            <button class="btn btn-primary" id="saveBtn" style="width:100%;margin-top:18px">Enregistrer</button>
          </div>
          <div class="card">
            <h3>Photos</h3>
            <div class="dropzone" id="dropzone">Glissez vos photos ici<br>ou cliquez pour parcourir<input type="file" id="fileInput" accept="image/*" multiple hidden></div>
            <div class="thumbs" id="thumbs"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- icônes catégories pour les placeholders -->
<svg width="0" height="0" style="position:absolute"><defs>
<g id="ic_default"><rect x="14" y="18" width="26" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M14 26 H40" stroke="currentColor" stroke-width="2"/></g>
</defs></svg>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
const sb = window.sb;
const $ = s => document.querySelector(s);
const el = (t,a={},...c)=>{const e=document.createElement(t);for(const k in a){if(k==='class')e.className=a[k];else if(k==='html')e.innerHTML=a[k];else e.setAttribute(k,a[k]);}c.forEach(x=>e.append(x));return e;};
const placeholderSVG = '<svg viewBox="0 0 54 48" fill="none"><rect x="14" y="14" width="26" height="20" rx="3" stroke="currentColor" stroke-width="2"/><path d="M14 22 H40" stroke="currentColor" stroke-width="2"/></svg>';

let CATS = [], PRODUCTS = [], current = null;

function toast(msg, kind){const t=$('#toast');t.textContent=msg;t.className='show '+(kind||'');setTimeout(()=>t.className=t.className.replace('show','').trim(),2600);}

/* ---------- config manquante ---------- */
if(!sb){
  $('#cfgNotice').innerHTML = '<div class="notice">Configuration requise : ouvre <code>supabase-config.js</code> et renseigne ton URL de projet et ta clé <code>anon</code>, puis recharge cette page.</div>';
  $('#loginBtn').disabled = true; $('#loginBtn').style.opacity=.5;
}

/* ---------- AUTH ---------- */
async function boot(){
  if(!sb) return;
  const { data:{ session } } = await sb.auth.getSession();
  if(session) enterApp(session); 
}
function enterApp(session){
  $('#loginScreen').style.display='none';
  $('#app').style.display='block';
  $('#who').textContent = session.user.email;
  loadAll();
}
$('#loginBtn').addEventListener('click', login);
$('#loginPass').addEventListener('keydown', e=>{if(e.key==='Enter')login();});
async function login(){
  const email=$('#loginEmail').value.trim(), password=$('#loginPass').value;
  $('#loginErr').textContent='';
  if(!email||!password){$('#loginErr').textContent='Renseigne ton e-mail et ton mot de passe.';return;}
  const btn=$('#loginBtn'); btn.innerHTML='<span class="spin"></span>'; btn.disabled=true;
  const { data, error } = await sb.auth.signInWithPassword({email,password});
  btn.innerHTML='Se connecter'; btn.disabled=false;
  if(error){$('#loginErr').textContent = error.message.includes('Invalid')?'E-mail ou mot de passe incorrect.':error.message;return;}
  enterApp(data.session);
}
$('#logoutBtn').addEventListener('click', async()=>{ await sb.auth.signOut(); location.reload(); });

/* ---------- CHARGEMENT ---------- */
async function loadAll(){
  const [{data:cats},{data:prods,error}] = await Promise.all([
    sb.from('categories').select('*').order('sort_order'),
    sb.from('products').select('*').order('sort_order')
  ]);
  if(error){toast('Erreur de chargement : '+error.message,'bad');return;}
  CATS = cats||[]; PRODUCTS = prods||[];
  // selects catégories
  const opts = CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  $('#f_category').innerHTML = opts;
  $('#filterCat').innerHTML = '<option value="">Toutes catégories</option>'+opts;
  renderList();
}
const catName = id => (CATS.find(c=>c.id===id)||{}).name || '—';

/* ---------- LISTE ---------- */
$('#filterCat').addEventListener('change', renderList);
$('#filterStatus').addEventListener('change', renderList);
function renderList(){
  const fc=$('#filterCat').value, fs=$('#filterStatus').value;
  let rows = PRODUCTS.filter(p=>(!fc||p.category_id===fc)&&(!fs||p.status===fs));
  $('#count').textContent = rows.length+' produit'+(rows.length>1?'s':'');
  const body=$('#listBody'); body.innerHTML='';
  if(!PRODUCTS.length){
    body.append(el('div',{class:'empty',html:'<h3>Aucun produit pour l\'instant</h3><p>Crée ta première fiche, ou colle un lien Alibaba pour partir d\'une base.</p><button class="btn btn-primary" onclick="newProduct()">+ Nouveau produit</button>'}));
    return;
  }
  if(!rows.length){ body.append(el('div',{class:'empty',html:'<h3>Aucun résultat</h3><p>Aucun produit ne correspond à ce filtre.</p>'})); return; }
  const tbl=el('div',{class:'tbl'});
  tbl.append(el('div',{class:'trow head'},el('span',{},'Photo'),el('span',{},'Produit'),el('span',{class:'t-cat'},'Catégorie'),el('span',{class:'t-price'},'Prix'),el('span',{},'Statut'),el('span',{})));
  rows.forEach(p=>{
    const thumb=el('div',{class:'thumb'});
    if(p.images&&p.images.length){thumb.append(el('img',{src:p.images[0],alt:''}));}else{thumb.innerHTML=placeholderSVG;}
    const info=el('div',{},el('div',{class:'t-title'},p.title||'(sans titre)'),el('div',{class:'t-sum'},p.summary||''));
    const price = p.price_mode==='fixed'&&p.price ? Number(p.price).toLocaleString('fr-FR')+' €' : (p.price_label||'Sur devis');
    const badge=el('span',{class:'badge '+(p.status==='published'?'published':'draft')}, p.status==='published'?'Publié':'Brouillon');
    const actions=el('div',{class:'t-actions'});
    const edit=el('button',{class:'btn btn-ghost btn-sm'},'Modifier'); edit.onclick=()=>openEditor(p);
    const pub=el('button',{class:'btn btn-ghost btn-sm'}, p.status==='published'?'Dépublier':'Publier'); pub.onclick=()=>togglePublish(p);
    actions.append(edit,pub);
    tbl.append(el('div',{class:'trow'},thumb,info,el('span',{class:'t-cat'},catName(p.category_id)),el('span',{class:'t-price'},price),badge,actions));
  });
  body.append(tbl);
}

async function togglePublish(p){
  const next = p.status==='published'?'draft':'published';
  const { error } = await sb.from('products').update({status:next}).eq('id',p.id);
  if(error){toast(error.message,'bad');return;}
  p.status=next; renderList();
  toast(next==='published'?'Produit publié':'Produit dépublié','ok');
}

/* ---------- ÉDITEUR ---------- */
$('#newBtn').addEventListener('click', ()=>newProduct());
$('#backBtn').addEventListener('click', ()=>showScreen('listScreen'));
window.newProduct = function(){
  current = { id: crypto.randomUUID(), category_id: CATS[0]?.id||null, title:'', summary:'', description:'',
    price_mode:'quote', price:null, price_label:'Sur devis', supplier_url:'', images:[], status:'draft', _isNew:true };
  fillEditor(); $('#edTitle').textContent='Nouveau produit'; $('#deleteBtn').style.display='none'; showScreen('editScreen');
};
function openEditor(p){
  current = JSON.parse(JSON.stringify(p)); current._isNew=false;
  fillEditor(); $('#edTitle').textContent='Modifier le produit'; $('#deleteBtn').style.display='inline-flex'; showScreen('editScreen');
}
function fillEditor(){
  $('#f_title').value=current.title||''; $('#f_category').value=current.category_id||'';
  $('#f_summary').value=current.summary||''; $('#f_description').value=current.description||'';
  $('#f_supplier').value=current.supplier_url||''; $('#f_status').value=current.status||'draft';
  $('#f_priceMode').value=current.price_mode||'quote'; $('#f_priceLabel').value=current.price_label||'';
  renderThumbs();
}
function showScreen(id){document.querySelectorAll('.wrap .screen').forEach(s=>{const on=(s.id===id);s.classList.toggle('active',on);s.style.display=on?'block':'none';});window.scrollTo(0,0);}

/* images */
function renderThumbs(){
  const box=$('#thumbs'); box.innerHTML='';
  (current.images||[]).forEach((url,i)=>{
    const item=el('div',{class:'thumb-item'}, el('img',{src:url,alt:''}));
    if(i===0) item.append(el('span',{class:'first-tag'},'Principale'));
    const acts=el('div',{class:'ti-actions'});
    const left=el('button',{title:'Déplacer à gauche'},'◀'); left.onclick=()=>moveImg(i,-1);
    const del=el('button',{title:'Supprimer'},'✕'); del.onclick=()=>removeImg(i);
    const right=el('button',{title:'Déplacer à droite'},'▶'); right.onclick=()=>moveImg(i,1);
    acts.append(left,del,right); item.append(acts); box.append(item);
  });
}
function moveImg(i,d){const a=current.images;const j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];renderThumbs();}
function removeImg(i){current.images.splice(i,1);renderThumbs();}

const dz=$('#dropzone'), fi=$('#fileInput');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files);});
fi.addEventListener('change',()=>handleFiles(fi.files));
async function handleFiles(files){
  if(!files||!files.length)return;
  dz.innerHTML='<span class="spin"></span> Envoi en cours…';
  for(const file of files){
    if(!file.type.startsWith('image/'))continue;
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=`${current.id}/${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;
    const { error } = await sb.storage.from('product-images').upload(path,file,{cacheControl:'3600',upsert:true});
    if(error){toast('Upload : '+error.message,'bad');continue;}
    const { data:{ publicUrl } } = sb.storage.from('product-images').getPublicUrl(path);
    current.images.push(publicUrl);
  }
  dz.innerHTML='Glissez vos photos ici<br>ou cliquez pour parcourir';
  renderThumbs();
}

/* save / delete */
$('#saveBtn').addEventListener('click', save);
async function save(){
  current.title=$('#f_title').value.trim();
  current.category_id=$('#f_category').value||null;
  current.summary=$('#f_summary').value.trim();
  current.description=$('#f_description').value.trim();
  current.supplier_url=$('#f_supplier').value.trim();
  current.status=$('#f_status').value;
  current.price_mode=$('#f_priceMode').value;
  current.price_label=$('#f_priceLabel').value.trim()||(current.price_mode==='quote'?'Sur devis':null);
  if(!current.title){toast('Le titre est obligatoire.','bad');$('#f_title').focus();return;}
  const btn=$('#saveBtn'); btn.innerHTML='<span class="spin"></span>'; btn.disabled=true;
  const row={id:current.id,category_id:current.category_id,title:current.title,summary:current.summary,
    description:current.description,price_mode:current.price_mode,price_label:current.price_label,
    supplier_url:current.supplier_url,images:current.images,status:current.status,
    sort_order:current.sort_order||0};
  const { error } = await sb.from('products').upsert(row);
  btn.innerHTML='Enregistrer'; btn.disabled=false;
  if(error){toast('Enregistrement : '+error.message,'bad');return;}
  toast('Produit enregistré','ok');
  await loadAll(); showScreen('listScreen');
}
$('#deleteBtn').addEventListener('click', async()=>{
  if(!confirm('Supprimer définitivement ce produit ?'))return;
  const { error } = await sb.from('products').delete().eq('id',current.id);
  if(error){toast(error.message,'bad');return;}
  // nettoyage des images du storage
  if(current.images&&current.images.length){
    const paths=current.images.map(u=>u.split('/product-images/')[1]).filter(Boolean);
    if(paths.length) sb.storage.from('product-images').remove(paths);
  }
  toast('Produit supprimé','ok');
  await loadAll(); showScreen('listScreen');
});

/* prix : libellé auto */
$('#f_priceMode').addEventListener('change',e=>{
  if(e.target.value==='quote' && !$('#f_priceLabel').value.trim()) $('#f_priceLabel').value='Sur devis';
});

boot();
</script>
</body>
</html>
